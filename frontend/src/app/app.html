<main class="app-layout">
  <div class="content-area">
    <app-explorer-page [isFocusMode]="isFocusMode" />
  </div>
  <app-sidebar (loginClick)="toggleLoginModal()" (toggleLayout)="toggleFocusMode()" (aboutClick)="toggleAboutModal()" />
</main>

<app-login-modal *ngIf="isLoginModalOpen" (close)="toggleLoginModal()" />
<app-about-modal *ngIf="isAboutModalOpen" (close)="toggleAboutModal()" />
